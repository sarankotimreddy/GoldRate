name: Build .NET MAUI (.NET 9)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Android workload
        run: dotnet workload install maui-android   # ← install only android, not all maui

      - name: Restore project
        run: dotnet restore -f net9.0-android       # ← scope to android only

      - name: Build Android
        run: |
          dotnet build -f net9.0-android -c Release \
            /p:AndroidSigningKeyPass="" \
            /p:AndroidSigningStorePass=""

      - name: Publish Android
        run: |
          dotnet publish -f net9.0-android -c Release -o publish \
            /p:AndroidSigningKeyPass="" \
            /p:AndroidSigningStorePass=""

      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: publish/

  build-ios:
    name: iOS
    runs-on: macos-15          # ← was macos-14 (Xcode 15.x), needs macos-15 (Xcode 16.x)
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore workload
        run: dotnet workload restore

      - name: Restore project
        run: dotnet restore

      - name: Build iOS
        run: |
          dotnet build -f net9.0-ios -c Release \
            /p:RuntimeIdentifier=ios-arm64 \
            /p:CodesignKey="" \
            /p:CodesignProvision="" \
            /p:BuildIpa=false

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: "**/bin/Release/net9.0-ios/"

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore workload
        run: dotnet workload restore

      - name: Restore project
        run: dotnet restore

      - name: Build Windows
        run: dotnet build -f net9.0-windows10.0.19041.0 -c Release /p:WindowsPackageType=None

      - name: Publish Windows
        run: dotnet publish -f net9.0-windows10.0.19041.0 -c Release -o publish /p:WindowsPackageType=None

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: publish/
